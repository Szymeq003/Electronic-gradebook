<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lista Nauczycieli</title>
</head>

<body>

    <nav>
        <a th:href="@{/teachers}">Nauczyciele</a> |
        <a th:href="@{/students}">Uczniowie</a> |
        <a th:href="@{/classes}">Klasy</a> |
        <a th:href="@{/subjects}">Przedmioty</a> |
        <a th:href="@{/schedules}">Plan Lekcji</a> |
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:none; border:none; color:blue; text-decoration:underline; cursor:pointer; font-size:inherit; padding:0;">Wyloguj się</button>
        </form>
    </nav>
    <hr />

    <h1>Dodaj Nauczyciela</h1>

    <form th:action="@{/add}" method="post" th:object="${newTeacher}">
        <label>Imię: <input type="text" th:field="*{firstName}" /></label><br />
        <label>Nazwisko: <input type="text" th:field="*{lastName}" /></label><br />
        <label>Email: <input type="text" th:field="*{email}" /></label><br />
        <button type="submit">Zapisz do bazy</button>
    </form>

    <hr />

    <h1>Obecni nauczyciele w bazie</h1>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Imię</th>
                <th>Nazwisko</th>
                <th>Email</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${teachers}">
                <td th:text="${t.id}"></td>
                <td th:text="${t.firstName}"></td>
                <td th:text="${t.lastName}"></td>
                <td th:text="${t.email}"></td>
                <td>
                    <a th:href="@{/edit/{id}(id=${t.id})}">Edytuj</a> |
                    <a th:href="@{/delete/{id}(id=${t.id})}"
                        onclick="return confirm('Czy na pewno chcesz usunąć tego nauczyciela?');">Usuń</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(teachers)}">
                <td colspan="5">Brak nauczycieli w bazie.</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
