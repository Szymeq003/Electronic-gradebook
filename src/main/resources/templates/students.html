<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Panel Uczniowie</title>
</head>

<body>

    <nav>
        <a th:href="@{/}">Nauczyciele</a> | 
        <a th:href="@{/students}">Uczniowie</a> | 
        <a th:href="@{/students/add}">Dodaj Ucznia</a> | 
        <a th:href="@{/classes}">Klasy</a>
    </nav>
    <hr />

    <h1>Uczniowie w bazie (Filtrowanie)</h1>

    <form th:action="@{/students}" method="get">
        <label>Wyszukaj (Imię/Nazwisko):
            <input type="text" name="search" th:value="${searchQuery}" placeholder="Wpisz imię lub nazwisko..." />
        </label>
        <label>Filtrowanie klas:
            <select name="classId">
                <option value="">Wszystkie klasy</option>
                <option th:each="c : ${schoolClasses}" th:value="${c.id}" th:text="${c.name}"
                    th:selected="${c.id == selectedClassId}">
                </option>
            </select>
        </label>
        <button type="submit">Szukaj</button>
        <a th:href="@{/students}"><button type="button">Wyczyść</button></a>
    </form>

    <br />

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Imię</th>
                <th>Nazwisko</th>
                <th>Email</th>
                <th>Klasa</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.firstName}"></td>
                <td th:text="${s.lastName}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.schoolClass.name}"></td>
                <td>
                    <a th:href="@{/students/edit/{id}(id=${s.id})}">Edytuj</a> |
                    <a th:href="@{/students/delete/{id}(id=${s.id})}"
                        onclick="return confirm('Czy na pewno chcesz usunąć tego ucznia?');">Usuń</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="6">Brak uczniów w bazie.</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
