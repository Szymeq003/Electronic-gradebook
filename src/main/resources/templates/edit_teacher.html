<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edytuj Nauczyciela</title>
</head>

<body>

    <nav>
        <a th:href="@{/}">Nauczyciele</a> | 
        <a th:href="@{/students}">Uczniowie</a> | 
        <a th:href="@{/students/add}">Dodaj Ucznia</a> | 
        <a th:href="@{/classes}">Klasy</a>
    </nav>
    <hr />

    <h1>Edytuj Nauczyciela</h1>

    <form th:action="@{/edit/{id}(id=${teacher.id})}" method="post" th:object="${teacher}">
        <label>Imię: <input type="text" th:field="*{firstName}" /></label><br />
        <label>Nazwisko: <input type="text" th:field="*{lastName}" /></label><br />
        <label>Email: <input type="text" th:field="*{email}" /></label><br />
        <button type="submit">Zapisz Zmiany</button>
    </form>

    <br />
    <a th:href="@{/}">Powrót do listy</a>

</body>

</html>
