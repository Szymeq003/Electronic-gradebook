<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frekwencja Ucznia - Dzienniczek</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

    <div class="container" style="padding: 3rem 0;" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
        <a sec:authorize="hasRole('TEACHER')" href="/teacher/dashboard" class="btn btn-ghost" style="margin-bottom: 2rem;">← Powrót do dashboardu</a>
        <a sec:authorize="hasRole('ADMIN')" href="/admin/students" class="btn btn-ghost" style="margin-bottom: 2rem;">← Powrót do listy</a>

        <div class="header" style="margin-bottom: 3rem;">
            <h1 th:text="|Karta Obecności: ${student.firstName} ${student.lastName}|">Frekwencja Ucznia</h1>
            <p class="text-muted" th:text="'Klasa ' + ${student.schoolClass.name}">Klasa 1A</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; align-items: start;">
            <!-- Stats -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Statystyki</h3>
                <div style="font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem;" th:text="${#numbers.formatDecimal(statPercentage, 1, 2)} + ' %'"></div>
                <div class="text-muted" style="font-size: 0.875rem; font-weight: 600; margin-bottom: 1.5rem;">ŁĄCZNA FREKWENCJA</div>
                
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <div style="display: flex; justify-content: space-between;">
                        <span class="text-muted">Obecności:</span>
                        <strong th:text="${statPresent}"></strong>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span class="text-muted">Spóźnienia:</span>
                        <strong th:text="${statLate}"></strong>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span class="text-muted">Nieobecności:</span>
                        <strong style="color: var(--accent-danger);" th:text="${statAbsent}"></strong>
                    </div>
                </div>
            </div>

            <!-- Form & List -->
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">Dodaj wpis do dziennika</h3>
                    <form th:action="@{/attendance/add}" method="post" th:object="${newAttendance}">
                        <input type="hidden" name="studentId" th:value="${student.id}" />
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label>Przedmiot</label>
                                <select name="subjectId" class="input-control" required>
                                    <option value="" disabled selected>Wybierz przedmiot</option>
                                    <option th:each="sub : ${subjects}" th:value="${sub.id}" th:text="|${sub.name} (${sub.teacher.lastName})|"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select th:field="*{status}" class="input-control" required>
                                    <option value="" disabled selected>Ustal status</option>
                                    <option th:each="st : ${statuses}" th:value="${st}" th:text="${st}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Data zajęć</label>
                            <input type="date" th:field="*{date}" class="input-control" required />
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Zapisz obecność</button>
                    </form>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Przedmiot</th>
                                <th>Status</th>
                                <th>Akcja</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="a : ${attendances}">
                                <td th:text="${a.date}" style="font-weight: 600;"></td>
                                <td th:text="|${a.subject.name} (mgr ${a.subject.teacher.lastName})|"></td>
                                <td>
                                    <span th:class="|badge ${a.status == 'OBECNY' ? 'badge-success' : (a.status == 'NIEOBECNY' ? 'badge-danger' : 'badge-warning')}|" 
                                          th:text="${a.status}"
                                          th:style="${a.status == 'NIEOBECNY' ? 'background: #fee2e2; color: #ef4444; border: 1px solid #fecaca;' : ''}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/attendance/delete/{id}(id=${a.id})}" class="text-danger" style="color: var(--accent-danger); font-size: 0.875rem; font-weight: 600;">Usuń</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
